<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Audio Player</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .player-card {
            background: #181818;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 300px;
        }

        h2 { color: #1DB954; margin-bottom: 5px; }
        p { color: #b3b3b3; margin-bottom: 20px; }

        /* Play Button Style */
        .play-btn {
            background-color: #1DB954;
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background-color: #1ed760;
        }

        audio {
            margin-top: 20px;
            width: 100%;
            filter: invert(100%); /* Isse player black/white ho jayega */
        }
    </style>
</head>
<body>

    <div class="player-card">
        <h2>Motu Patlu Mix</h2>
        <p>Samosa Party - Special Track</p>
        
        <audio id="mySong">
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <button class="play-btn" onclick="playMusic()">▶ PLAY</button>
    </div>

    <script>
        function playMusic() {
            var song = document.getElementById("mySong");
            var btn = document.querySelector(".play-btn");

            if (song.paused) {
                song.play();
                btn.innerHTML = "⏸ PAUSE";
            } else {
                song.pause();
                btn.innerHTML = "▶ PLAY";
            }
        }
    </script>

</body>
</html>
